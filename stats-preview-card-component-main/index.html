<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Frontend mentor | Stats preview card component</title>
  </head>
  <body>
    <section class="wrapper">
      <div class="inner-1">
        <h2>Get <span>insights</span> that help your business grow.</h2>
        <p>
          Discover the benefits of data analytics and make better decisions
          regarding revenue, customer experice and overall efficiency.
        </p>
        <div class="info">
          <div>
            <p>10k+</p>
            <p class="small">COMPANIES</p>
          </div>
          <div>
            <p>314</p>
            <p class="small">TEMPLATES</p>
          </div>
          <div>
            <p>12M+</p>
            <p class="small">QUERIES</p>
          </div>
        </div>
      </div>
      <div class="inner-2">
        <div class="pink-overlay"></div>
        <picture>
          <source media="(min-width: 500px)" srcset="./images/image-header-desktop.jpg">
          <img src="./images/image-header-mobile.jpg" alt="mobile-image">
        </picture>
      </div>
    </section>
  </body>
</html>
