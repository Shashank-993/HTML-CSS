<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Frontend mentor | result-summary-card</title>
  </head>
  <body>
    <section class="container">
      <div class="result">
        <h3>Your Result</h3>
        <div class="circle">
          <h1>76</h1>
          <p>of 100</p>
        </div>
        <h2>Great</h2>
        <p>
          You scored higher than 65% of <br />
          the people who have taken <br />
          these tests.
        </p>
      </div>
      <div class="summary">
        <h2 class="summary-heading">Summary</h2>
        <div class="inner-container">
          <div class="stats red">
            <div class="labels">
              <img src="./assets/images/icon-reaction.svg" alt="" />
              <h2>Reaction</h2>
            </div>
            <p><span class="bold">80&nbsp;&nbsp;</span>/&nbsp;100</p>
          </div>
          <div class="stats yellow">
            <div class="labels">
              <img src="./assets/images/icon-memory.svg" alt="" />
              <h2>Memory</h2>
            </div>
            <p><span class="bold">92&nbsp;&nbsp;</span>/&nbsp;100</p>
          </div>
          <div class="stats green">
            <div class="labels">
              <img src="./assets/images/icon-verbal.svg" alt="" />
              <h2>Verbal</h2>
            </div>
            <p><span class="bold">61&nbsp;&nbsp;</span>/&nbsp;100</p>
          </div>
          <div class="stats blue">
            <div class="labels">
              <img src="./assets/images/icon-visual.svg" alt="" />
              <h2>Visual</h2>
            </div>
            <p><span class="bold">73&nbsp;&nbsp;</span>/&nbsp;100</p>
          </div>
        </div>
        <button class="btn">Continue</button>
      </div>
    </section>
  </body>
</html>
