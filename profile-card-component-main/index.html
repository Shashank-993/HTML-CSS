<!doctype html>
<html lang="en">
  <head0>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inconsolata:wght@200..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Kumbh+Sans:wght,YOPQ@100..900,300&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&family=Petit+Formal+Script&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Frontend Mentor | Profile card component</title>
  </head0>
  <body>
    <main>
      <!-- Main section container -->
      <section class="container">
        <!-- blue background container -->
        <div class="svg-div">
          <img src="./images/bg-pattern-card.svg" alt="card-pattern" />
        </div>
        <!-- user-details container -->
        <div class="details-div">
          <div class="user-div">
            <img
              class="victor-image"
              src="./images/image-victor.jpg"
              alt="image-victor"
            />
            <h2><strong>Victor Crest</strong>&nbsp;&nbsp;<span>26</span></h2>
            <p>London</p>
          </div>
          <div class="stats-div">
            <div class="stats">
              <h3>80K</h3>
              <small>Followers</small>
            </div>
            <div class="stats">
              <h3>803K</h3>
              <small>Likes</small>
            </div>
            <div class="stats">
              <h3>1.4K</h3>
              <small>Photos</small>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
