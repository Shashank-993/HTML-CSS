<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./images/favicon-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inconsolata:wght@200..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&family=Petit+Formal+Script&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Frontend mentor | NFT card</title>
  </head>
  <body>
    <!-- Main wrapper -->
    <section class="wrapper">
      <!-- img div -->
      <div class="img-div">
        <div class="hidden active-div">
          <img src="./images/icon-view.svg" alt="icon-view" />
        </div>
        <img
          class="equilibrium-image"
          src="./images/image-equilibrium.jpg"
          alt="equilibrim-image"
        />
      </div>
      <!-- content div -->
      <div class="content-div">
        <h2>Equilibrium #3429</h2>
        <p>Our equilibrium collection promotes balance and calm.</p>
        <div class="inner-1">
          <div class="ethereum-div">
            <img
              width="15"
              src="./images/icon-ethereum.svg"
              alt="icon-ethereum"
            />
            <p>0.041 ETH</p>
          </div>
          <div class="clock-div">
            <img width="25" src="./images/icon-clock.svg" alt="icon-clock" />
            <p>3 days left</p>
          </div>
        </div>
        <div class="inner-2">
          <img
            class="avatar"
            width="35"
            height="35"
            src="./images/image-avatar.png"
            alt="image-avatar"
          />
          <p>Creation of <strong>Jules Wyvern</strong></p>
        </div>
      </div>
    </section>
  </body>
</html>
